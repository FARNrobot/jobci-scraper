<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobCI — Emprego em Ciência da Informação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;--color-surface-dynamic:#e6e4df;--color-divider:#dcd9d5;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;--color-text-inverse:#f9f8f4;--color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;--color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-highlight:#d4dfcc;--color-warning:#964219;--color-warning-highlight:#ddcfc6;--color-blue:#006494;--color-blue-highlight:#c6d8e4;--color-purple:#7a39bb;--color-purple-highlight:#dacfde;--color-orange:#da7101;--color-orange-highlight:#e7d7c4;--color-gold:#d19900;--color-gold-highlight:#e9e0c6;--radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;--shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);--shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);--transition:180ms cubic-bezier(.16,1,.3,1);--text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);--text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;--content-default:1100px;}
[data-theme="dark"]{--color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;--color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;--color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;--color-success:#6daa45;--color-success-highlight:#3a4435;--color-warning:#bb653b;--color-warning-highlight:#564942;--color-blue:#5591c7;--color-blue-highlight:#3a4550;--color-purple:#a86fdf;--color-purple-highlight:#4e4652;--color-orange:#fdab43;--color-orange-highlight:#564b3e;--color-gold:#e8af34;--color-gold-highlight:#4d4332;--shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);--shadow-lg:0 12px 32px oklch(0 0 0/.4);}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;--color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;--color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);}
img{display:block;max-width:100%;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
ul{list-style:none;}
a,button,input,select{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
.app{display:grid;grid-template-columns:272px 1fr;grid-template-rows:auto 1fr;min-height:100dvh;}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-6);background:var(--color-surface);border-bottom:1px solid oklch(from var(--color-text) l c h/.1);position:sticky;top:0;z-index:100;}
.sidebar{background:var(--color-surface);border-right:1px solid oklch(from var(--color-text) l c h/.08);padding:var(--space-6);overflow-y:auto;height:calc(100dvh - 54px);position:sticky;top:54px;}
.main{padding:var(--space-6);overflow-y:auto;}
.logo{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text);}
.logo-icon{width:30px;height:30px;flex-shrink:0;}
.logo-text{font-family:var(--font-display);font-size:var(--text-base);font-weight:400;}
.logo-text span{color:var(--color-primary);font-style:italic;}
.topbar-search{flex:1;max-width:460px;position:relative;}
.topbar-search input{width:100%;padding:var(--space-2) var(--space-4) var(--space-2) 2.4rem;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-full);font-size:var(--text-sm);color:var(--color-text);}
.topbar-search input::placeholder{color:var(--color-text-muted);}
.topbar-search input:focus{outline:2px solid var(--color-primary);outline-offset:0;border-color:transparent;}
.search-icon{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--color-text-muted);pointer-events:none;}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:var(--space-3);}
.results-count{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;}
.last-updated{font-size:var(--text-xs);color:var(--color-text-faint);white-space:nowrap;}
.theme-toggle{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--color-text-muted);}
.theme-toggle:hover{background:var(--color-surface-offset);color:var(--color-text);}
.filter-section{margin-bottom:var(--space-5);}
.filter-title{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--space-3);}
.filter-group{display:flex;flex-direction:column;gap:var(--space-1);}
.filter-label{display:flex;align-items:center;gap:var(--space-2);cursor:pointer;font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);}
.filter-label:hover{background:var(--color-surface-offset);color:var(--color-text);}
.filter-label input[type=checkbox]{accent-color:var(--color-primary);width:14px;height:14px;flex-shrink:0;}
.filter-label .count{margin-left:auto;font-size:var(--text-xs);color:var(--color-text-faint);background:var(--color-surface-offset);padding:1px 6px;border-radius:var(--radius-full);}
.filter-divider{height:1px;background:var(--color-divider);margin:var(--space-3) 0;}
.clear-btn{font-size:var(--text-xs);color:var(--color-primary);background:none;border:none;cursor:pointer;padding:0;}
.clear-btn:hover{text-decoration:underline;}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);}
.sidebar-heading{font-size:var(--text-sm);font-weight:600;color:var(--color-text);}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5);flex-wrap:wrap;gap:var(--space-3);}
.main-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;color:var(--color-text);line-height:1.2;}
.main-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:var(--space-1);}
.sort-select{padding:var(--space-2) var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);font-size:var(--text-xs);color:var(--color-text-muted);cursor:pointer;}
.active-filters{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-4);}
.filter-tag{display:flex;align-items:center;gap:var(--space-1);background:var(--color-primary-highlight);color:var(--color-primary);border-radius:var(--radius-full);padding:3px var(--space-3) 3px var(--space-2);font-size:var(--text-xs);font-weight:500;}
.jobs-grid{display:flex;flex-direction:column;gap:var(--space-3);}
.job-card{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/.08);border-radius:var(--radius-xl);padding:var(--space-5) var(--space-6);cursor:pointer;transition:box-shadow var(--transition),transform var(--transition);}
.job-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.job-card.saved{border-color:oklch(from var(--color-primary) l c h/.35);}
.job-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-3);}
.job-title{font-size:var(--text-base);font-weight:600;color:var(--color-text);margin-bottom:var(--space-1);line-height:1.3;}
.job-org{font-size:var(--text-sm);color:var(--color-text-muted);}
.job-save{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-faint);flex-shrink:0;}
.job-save:hover{background:var(--color-surface-offset);color:var(--color-text-muted);}
.job-save.active{color:var(--color-primary);}
.job-meta{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-3);}
.meta-badge{display:flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--color-text-muted);background:var(--color-surface-offset);padding:3px var(--space-2);border-radius:var(--radius-full);}
.job-tags{display:flex;flex-wrap:wrap;gap:var(--space-2);}
.job-tag{font-size:var(--text-xs);padding:2px var(--space-2);border-radius:var(--radius-full);font-weight:500;}
.tag-skill{background:var(--color-surface-offset-2);color:var(--color-text-muted);}
.job-footer{margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--color-divider);display:flex;align-items:center;justify-content:space-between;}
.job-date{font-size:var(--text-xs);color:var(--color-text-faint);}
.deadline-badge{font-size:var(--text-xs);color:var(--color-warning);font-weight:500;}
.job-apply{font-size:var(--text-xs);font-weight:500;color:var(--color-primary);padding:var(--space-1) var(--space-3);border:1px solid var(--color-primary);border-radius:var(--radius-full);text-decoration:none;}
.job-apply:hover{background:var(--color-primary);color:var(--color-text-inverse);}
.new-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--color-success-highlight);color:var(--color-success);padding:2px 6px;border-radius:var(--radius-full);margin-left:var(--space-2);vertical-align:middle;}
.source-badge{font-size:10px;padding:1px 5px;border-radius:var(--radius-full);background:var(--color-blue-highlight);color:var(--color-blue);font-weight:500;margin-left:var(--space-1);}
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
.empty-icon{width:48px;height:48px;margin-bottom:var(--space-4);color:var(--color-text-faint);}
.empty-state h3{font-size:var(--text-base);font-weight:600;color:var(--color-text);margin-bottom:var(--space-2);}
.empty-state p{max-width:36ch;margin-bottom:var(--space-5);font-size:var(--text-sm);}
.tabs{display:flex;gap:2px;background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-5);width:fit-content;}
.tab-btn{padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-xs);font-weight:500;color:var(--color-text-muted);background:none;border:none;cursor:pointer;transition:all var(--transition);}
.tab-btn.active{background:var(--color-surface);color:var(--color-text);box-shadow:var(--shadow-sm);}
.tab-btn:hover:not(.active){color:var(--color-text);}
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--color-primary);z-index:200;animation:loadbar 1.2s ease-in-out infinite;}
@keyframes loadbar{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(.6);transform-origin:left}100%{transform:scaleX(1);transform-origin:left;opacity:0}}
.area-gestao{--ab:var(--color-blue-highlight);--af:var(--color-blue);}
.area-arquivo{--ab:var(--color-purple-highlight);--af:var(--color-purple);}
.area-biblioteca{--ab:var(--color-gold-highlight);--af:var(--color-gold);}
.area-dados{--ab:var(--color-success-highlight);--af:var(--color-success);}
.area-digital{--ab:var(--color-primary-highlight);--af:var(--color-primary);}
.area-ux{--ab:var(--color-orange-highlight);--af:var(--color-orange);}
.mobile-filter-btn{display:none;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-sm);}
@media(max-width:768px){.app{grid-template-columns:1fr;}.sidebar{display:none;height:auto;position:static;}.sidebar.open{display:block;position:fixed;top:54px;left:0;right:0;bottom:0;z-index:200;overflow-y:auto;}.mobile-filter-btn{display:flex;}.main{padding:var(--space-4);}.last-updated{display:none;}}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <a href="#" class="logo" aria-label="JobCI">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="3" y="5" width="18" height="22" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 11h10M7 15h10M7 19h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="23" cy="22" r="5" fill="var(--color-primary)" opacity="0.15"/>
        <circle cx="23" cy="22" r="3" stroke="var(--color-primary)" stroke-width="1.5"/>
        <path d="M26 25l2.5 2.5" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Job<span>CI</span></span>
    </a>
    <div class="topbar-search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Pesquisar cargo, empresa, tecnologia…" aria-label="Pesquisar vagas">
    </div>
    <div class="topbar-actions">
      <span class="results-count" id="results-count"></span>
      <span class="last-updated" id="last-updated"></span>
      <button class="mobile-filter-btn" id="mobile-filter-btn" aria-label="Filtros">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filtros
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-heading">Filtros</span>
      <button class="clear-btn" id="clear-all-btn">Limpar tudo</button>
    </div>
    <div class="filter-section">
      <p class="filter-title">Área</p>
      <div class="filter-group" id="filter-area">
        <label class="filter-label"><input type="checkbox" value="Gestão da Informação"> Gestão da Informação <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Arquivo"> Arquivo / Documentação <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Biblioteca"> Biblioteca <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Dados"> Dados e Análise <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Digital"> Humanidades Digitais <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="UX"> UX / Arq. Informação <span class="count">0</span></label>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <p class="filter-title">Contrato</p>
      <div class="filter-group" id="filter-contrato">
        <label class="filter-label"><input type="checkbox" value="Efetivo"> Efetivo <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="A Prazo"> A Prazo <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Estágio"> Estágio <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Bolsa"> Bolsa <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Freelance"> Freelance <span class="count">0</span></label>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <p class="filter-title">Modalidade</p>
      <div class="filter-group" id="filter-modalidade">
        <label class="filter-label"><input type="checkbox" value="Presencial"> Presencial <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Híbrido"> Híbrido <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Remoto"> Remoto <span class="count">0</span></label>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <p class="filter-title">Setor</p>
      <div class="filter-group" id="filter-setor">
        <label class="filter-label"><input type="checkbox" value="Público"> Público <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Privado"> Privado <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Academia"> Academia <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Cultural"> Cultural <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="ONG"> ONG <span class="count">0</span></label>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <p class="filter-title">Localização</p>
      <div class="filter-group" id="filter-local">
        <label class="filter-label"><input type="checkbox" value="Porto"> Porto <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Lisboa"> Lisboa <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Braga"> Braga <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Coimbra"> Coimbra <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Brasil"> Brasil <span class="count">0</span></label>
        <label class="filter-label"><input type="checkbox" value="Internacional"> Internacional <span class="count">0</span></label>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <h1 class="main-title">Vagas em Ciência da Informação</h1>
        <p class="main-subtitle" id="subtitle">A carregar vagas…</p>
      </div>
      <select class="sort-select" id="sort-select" aria-label="Ordenar">
        <option value="recente">Mais recentes</option>
        <option value="deadline">Prazo a terminar</option>
        <option value="az">A–Z</option>
      </select>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="todas">Todas as vagas</button>
      <button class="tab-btn" data-tab="guardadas">Guardadas</button>
    </div>
    <div id="active-filters" class="active-filters"></div>
    <div id="tab-todas">
      <div class="jobs-grid" id="jobs-list"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <h3>Nenhuma vaga encontrada</h3>
        <p>Ajusta os filtros ou aguarda a próxima atualização automática.</p>
        <button class="job-apply" onclick="clearAllFilters()">Limpar filtros</button>
      </div>
    </div>
    <div id="tab-guardadas" style="display:none">
      <div class="jobs-grid" id="saved-list"></div>
      <div class="empty-state" id="saved-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <h3>Nenhuma vaga guardada</h3>
        <p>Clica no 🔖 para guardar vagas favoritas aqui.</p>
      </div>
    </div>
  </main>
</div>

<script>
// ── THEME ──
(function(){
  const r=document.documentElement,t=document.getElementById('theme-toggle');
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  function sun(){return'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';}
  function moon(){return'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
  t.innerHTML=d==='dark'?sun():moon();
  t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);t.innerHTML=d==='dark'?sun():moon();});
})();

// ── STATE ──
let JOBS=[],savedIds=new Set(),activeFilters={area:[],contrato:[],modalidade:[],setor:[],local:[]},searchQuery='',sortBy='recente',currentTab='todas';

// ── LOAD DATA ──
async function loadJobs(){
  // Tenta carregar o jobs.json gerado pelo scraper
  // Em GitHub Pages: ../data/jobs.json
  const paths=['./data/jobs.json','../data/jobs.json','data/jobs.json'];
  for(const path of paths){
    try{
      const r=await fetch(path);
      if(!r.ok) continue;
      const d=await r.json();
      JOBS=d.jobs||[];
      const lu=new Date(d.last_updated);
      document.getElementById('last-updated').textContent='Atualizado: '+lu.toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      document.getElementById('subtitle').textContent=`${JOBS.length} vagas rastreadas automaticamente`;
      break;
    } catch(e){continue;}
  }
  if(!JOBS.length){
    document.getElementById('subtitle').textContent='Aguarda o primeiro scraping (até 3h)';
  }
  renderJobs();
  updateCounts();
}

// ── UTILS ──
const TODAY=new Date('2026-05-08');
function daysAgo(s){const d=new Date(s),diff=Math.round((TODAY-d)/86400000);if(diff<=0)return'Hoje';if(diff===1)return'Ontem';return`Há ${diff} dias`;}
function daysUntil(s){return Math.round((new Date(s)-TODAY)/86400000);}
function fmtDeadline(s){const d=daysUntil(s);if(d<0)return'Prazo expirado';if(d===0)return'⚠ Termina hoje!';if(d<=7)return`⚠ Termina em ${d} dia${d>1?'s':''}`;const dt=new Date(s);return`Prazo: ${dt.toLocaleDateString('pt-PT',{day:'numeric',month:'short'})}`;}
const AREA_CLASS={
  'Gestão da Informação':'area-gestao','Arquivo':'area-arquivo','Biblioteca':'area-biblioteca',
  'Dados':'area-dados','Digital':'area-digital','UX':'area-ux'
};

// ── FILTER ──
function getFiltered(){
  return JOBS.filter(j=>{
    if(activeFilters.area.length&&!activeFilters.area.includes(j.area)) return false;
    if(activeFilters.contrato.length&&!activeFilters.contrato.includes(j.contrato)) return false;
    if(activeFilters.modalidade.length&&!activeFilters.modalidade.includes(j.modalidade)) return false;
    if(activeFilters.setor.length&&!activeFilters.setor.includes(j.setor)) return false;
    if(activeFilters.local.length&&!activeFilters.local.includes(j.local)) return false;
    if(searchQuery){
      const q=searchQuery.toLowerCase();
      return j.title.toLowerCase().includes(q)||j.org.toLowerCase().includes(q)||(j.tags||[]).some(t=>t.toLowerCase().includes(q))||(j.desc||'').toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>{
    if(sortBy==='recente') return new Date(b.posted)-new Date(a.posted);
    if(sortBy==='deadline') return new Date(a.deadline)-new Date(b.deadline);
    if(sortBy==='az') return a.title.localeCompare(b.title,'pt');
    return 0;
  });
}

// ── CARD ──
function cardHTML(j){
  const sv=savedIds.has(j.id),dl=daysUntil(j.deadline||''),urgent=dl>=0&&dl<=7,ac=AREA_CLASS[j.area]||'';
  return`<article class="job-card${sv?' saved':''}" data-id="${j.id}">
  <div class="job-card-header">
    <div>
      <div class="job-title">${j.title}${j.newBadge?'<span class="new-badge">Novo</span>':''}${j.source?`<span class="source-badge">${j.source}</span>`:''}</div>
      <div class="job-org">${j.org}</div>
    </div>
    <button class="job-save${sv?' active':''}" onclick="toggleSave('${j.id}')" aria-label="${sv?'Remover':'Guardar'}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="${sv?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
  <div class="job-meta">
    <span class="meta-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0z"/></svg>${j.local||'Portugal'}</span>
    <span class="meta-badge">${j.contrato||'—'}</span>
    <span class="meta-badge">${j.modalidade||'—'}</span>
    <span class="meta-badge ${ac}" style="background:var(--ab,var(--color-surface-offset));color:var(--af,var(--color-text-muted))">${j.area||'—'}</span>
  </div>
  ${(j.tags||[]).length?`<div class="job-tags">${j.tags.map(t=>`<span class="job-tag tag-skill">${t}</span>`).join('')}</div>`:''}
  <div class="job-footer">
    <div>
      <div class="job-date">${daysAgo(j.posted)}</div>
      ${j.deadline?`<div class="${urgent?'deadline-badge':'job-date'}">${fmtDeadline(j.deadline)}</div>`:''}
    </div>
    <a href="${j.url||'#'}" class="job-apply" target="_blank" rel="noopener noreferrer">Ver vaga →</a>
  </div>
</article>`;
}

// ── RENDER ──
function renderJobs(){
  const f=getFiltered(),list=document.getElementById('jobs-list'),empty=document.getElementById('empty-state');
  list.innerHTML=f.map(cardHTML).join('');
  empty.style.display=f.length?'none':'flex';
  document.getElementById('results-count').textContent=`${f.length} vaga${f.length!==1?'s':''}`;
  renderActiveTags();
}

function renderSaved(){
  const sv=JOBS.filter(j=>savedIds.has(j.id)),list=document.getElementById('saved-list'),empty=document.getElementById('saved-empty');
  list.innerHTML=sv.map(cardHTML).join('');
  empty.style.display=sv.length?'none':'flex';
}

// ── COUNTS ──
function updateCounts(){
  const FK=['area','contrato','modalidade','setor','local'];
  FK.forEach(key=>{
    document.querySelectorAll(`#filter-${key} input`).forEach(cb=>{
      const v=cb.value,c=JOBS.filter(j=>{
        for(const k of FK){if(k===key)continue;if(activeFilters[k].length&&!activeFilters[k].includes(j[k]))return false;}
        return j[key]===v;
      }).length;
      const el=cb.closest('label').querySelector('.count');
      if(el)el.textContent=c;
    });
  });
}

// ── ACTIVE TAGS ──
const FL={area:'Área',contrato:'Contrato',modalidade:'Modalidade',setor:'Setor',local:'Local'};
function renderActiveTags(){
  const tags=[];
  for(const[k,vs]of Object.entries(activeFilters))vs.forEach(v=>tags.push({k,v,l:`${FL[k]}: ${v}`}));
  if(searchQuery)tags.push({k:'search',v:searchQuery,l:`"${searchQuery}"`});
  document.getElementById('active-filters').innerHTML=tags.map(t=>`<span class="filter-tag">${t.l}<button onclick="removeTag('${t.k}','${t.v.replace(/'/g,"\\'")}')"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`).join('');
}

function removeTag(k,v){
  if(k==='search'){searchQuery='';document.getElementById('search-input').value='';}
  else{activeFilters[k]=activeFilters[k].filter(x=>x!==v);const cb=document.querySelector(`#filter-${k} input[value="${v}"]`);if(cb)cb.checked=false;}
  renderJobs();updateCounts();
}

function clearAllFilters(){
  for(const k of Object.keys(activeFilters))activeFilters[k]=[];
  searchQuery='';
  document.getElementById('search-input').value='';
  document.querySelectorAll('.filter-group input').forEach(c=>c.checked=false);
  renderJobs();updateCounts();
}

// ── SAVE ──
function toggleSave(id){
  if(savedIds.has(id))savedIds.delete(id);else savedIds.add(id);
  renderJobs();
  if(currentTab==='guardadas')renderSaved();
}

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-todas').style.display=currentTab==='todas'?'block':'none';
    document.getElementById('tab-guardadas').style.display=currentTab==='guardadas'?'block':'none';
    if(currentTab==='guardadas')renderSaved();
  });
});

// ── LISTENERS ──
['area','contrato','modalidade','setor','local'].forEach(k=>{
  document.getElementById(`filter-${k}`).addEventListener('change',e=>{
    const cb=e.target;
    if(cb.checked)activeFilters[k].push(cb.value);
    else activeFilters[k]=activeFilters[k].filter(v=>v!==cb.value);
    renderJobs();updateCounts();
  });
});
document.getElementById('search-input').addEventListener('input',e=>{searchQuery=e.target.value.trim();renderJobs();});
document.getElementById('sort-select').addEventListener('change',e=>{sortBy=e.target.value;renderJobs();});
document.getElementById('clear-all-btn').addEventListener('click',clearAllFilters);
document.getElementById('mobile-filter-btn').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));

// ── INIT ──
loadJobs();
</script>
</body>
</html>
