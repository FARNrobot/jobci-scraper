name: "JobCI — Deploy GitHub Pages"
on:
  workflow_run:
    workflows: ["JobCI — Scraper de Vagas"]
    types: [completed]
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p docs/data && cp data/jobs.json docs/data/jobs.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"
      - id: deployment
        uses: actions/deploy-pages@v4
